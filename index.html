<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花子先生門生學習之門</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
    background: #f7f1e3;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 35px 30px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    position: relative;
    border: 1px solid #eee;
  }

  .container::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: #d4af37;
    border-radius: 16px 0 0 16px;
  }

  h1 {
    text-align: center;
    font-size: 22px;
    color: #333;
    margin-bottom: 25px;
  }

  h2 {
    font-size: 18px;
    margin-bottom: 15px;
    color: #333;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
  }

  input:focus {
    border-color: #d4af37;
  }

  button {
    width: 100%;
    padding: 11px;
    margin-bottom: 8px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    background: #333;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #555;
  }

  #dashboard {
    display: none;
    line-height: 1.6;
    color: #444;
  }

  #dashboard p {
    margin-bottom: 8px;
  }

  .classroom-btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin: 20px 0;
    background: #4285F4;
    color: white;
    text-align: center;
    text-decoration: none;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
  }

  .classroom-btn:hover {
    background: #357ae8;
  }

  .tip {
    font-size: 14px;
    color: #666;
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>

<body>
  <div class="container">
    <h1>花子先生門生學習之門</h1>
    
    <div id="login-section">
      <input type="email" id="email" placeholder="輸入你的電郵" required>
      <input type="password" id="password" placeholder="輸入密碼（至少6位）" required>
      <button onclick="login()">登入</button>
      <button onclick="register()">註冊新帳號</button>
    </div>
    
    <div id="dashboard">
      <h2>歡迎回來，<span id="user-name"></span>！</h2>
      <p>你的課程進度：<span id="progress"></span></p>
      <p>下堂課：<span id="dateList"></span></p>
      <p>請檢查所有功課已經完成改正</p>

      <a href="https://classroom.google.com/c/Nzk2NzkyNDEyNDkx?cjc=dwgpxthq" 
         class="classroom-btn" target="_blank">
         點擊進入你的 Google Classroom
      </a>
      <p class="tip">（點擊後如見 Google 登入頁，請用你的 Google 帳號登入。加入班級後即可查看作業、Voov 直播等！有問題 WhatsApp 我）</p>

      <button onclick="logout()">登出</button>
    </div>
  </div>

  <!-- Firebase SDK via CDN (modular, version 12.11.0) -->
  <script type="module">
    // Import necessary modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    // Your Firebase configuration (from your console)
    const firebaseConfig = {
      apiKey: "AIzaSyCss_4a-zKLRgG3d8CRYWX1jEojgoq5nD4",
      authDomain: "hanako-online-school.firebaseapp.com",
      projectId: "hanako-online-school",
      storageBucket: "hanako-online-school.firebasestorage.app",
      messagingSenderId: "257688933708",
      appId: "1:257688933708:web:e4526c6769b4e7fc312be9",
      measurementId: "G-BNC87FRWV5"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Listen for auth state changes (auto handle login/logout on page load/refresh)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is signed in
        document.getElementById('user-name').textContent = user.email.split('@')[0]; // Use part of email as name
        // Progress/dateList: hard-code for now, later use Firestore per user
        document.getElementById('progress').textContent = "課程進度更新中...";
        document.getElementById('dateList').textContent = "下堂課待定";
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } else {
        // User is signed out
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    // Login function
    window.login = function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert('請輸入電郵和密碼！');
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert(`歡迎回來，${userCredential.user.email}！登入成功。`);
        })
        .catch((error) => {
          let msg = '登入失敗：';
          if (error.code === 'auth/wrong-password') msg += '密碼錯誤';
          else if (error.code === 'auth/user-not-found') msg += '無此帳號';
          else msg += error.message;
          alert(msg);
        });
    };

    // Register function
    window.register = function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert('請輸入電郵和密碼！');
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert(`註冊成功！歡迎 ${userCredential.user.email}，現在可以登入。`);
        })
        .catch((error) => {
          let msg = '註冊失敗：';
          if (error.code === 'auth/email-already-in-use') msg += '電郵已註冊';
          else if (error.code === 'auth/weak-password') msg += '密碼太弱（至少6位）';
          else msg += error.message;
          alert(msg);
        });
    };

    // Logout function
    window.logout = function() {
      signOut(auth).then(() => {
        alert('已登出');
      }).catch((error) => {
        alert('登出失敗：' + error.message);
      });
    };
  </script>
</body>
</html>
